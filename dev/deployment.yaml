apiVersion: apps/v2
kind: Deployment
metadata:
  name: development-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: dev-app
  template:
    metadata:
      labels:
        app: dev-app
    spec:
      containers:
      - name: dev-container
        image: europe-west4-docker.pkg.dev/qwiklabs-gcp-03-853e0a7f2971/my-repository/sample-app:v1.0
        ports:
        - containerPort: 8080
